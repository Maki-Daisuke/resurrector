name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: core/go.mod
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          "$((go env GOPATH))\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build binaries
        run: pnpm run build

      - name: Package release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path build/resurrector.exe, build/resurrector-ui.exe -DestinationPath "dist/resurrector-$tag-windows-amd64.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/resurrector-${{ github.ref_name }}-windows-amd64.zip
